version: '3.8'

services:
  mongo:
    image: mongo:7
    container_name: gameon_mongo
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: gameon

  redis:
    image: redis:7-alpine
    container_name: gameon_redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data

  server:
    build: ./server
    container_name: gameon_server
    ports:
      - '4000:4000'
    environment:
      NODE_ENV: development
      PORT: 4000
      MONGO_URI: mongodb://mongo:27017/gameon
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY}
      GOOGLE_MAPS_API_KEY: ${GOOGLE_MAPS_API_KEY}
      RESEND_API_KEY: ${RESEND_API_KEY}
      POSTHOG_API_KEY: ${POSTHOG_API_KEY}
      CLIENT_URL: http://localhost:5173
    depends_on:
      - mongo
      - redis
    volumes:
      - ./server:/app
      - /app/node_modules

  worker:
    build: ./server
    container_name: gameon_worker
    command: node workers/notificationWorker.js
    environment:
      NODE_ENV: development
      MONGO_URI: mongodb://mongo:27017/gameon
      REDIS_URL: redis://redis:6379
      RESEND_API_KEY: ${RESEND_API_KEY}
    depends_on:
      - mongo
      - redis
    volumes:
      - ./server:/app
      - /app/node_modules

  client:
    build: ./client
    container_name: gameon_client
    ports:
      - '5173:5173'
    environment:
      VITE_API_URL: http://localhost:4000
      VITE_CLERK_PUBLISHABLE_KEY: ${VITE_CLERK_PUBLISHABLE_KEY}
      VITE_GOOGLE_MAPS_API_KEY: ${GOOGLE_MAPS_API_KEY}
      VITE_POSTHOG_KEY: ${POSTHOG_API_KEY}
    depends_on:
      - server
    volumes:
      - ./client:/app
      - /app/node_modules

volumes:
  mongo_data:
  redis_data:
